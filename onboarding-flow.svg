<svg width="680" height="416" viewBox="0 0 680 416" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="680" height="416" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="30" font-size="15" font-weight="600" fill="#2c2c2a">Onboard one camera</text>
  <text x="40" y="49" font-size="12.5" fill="#5f5e5a">Steps 1-3 are data entry. The relay server is never reconfigured.</text>

  <!-- Step 1 -->
  <rect x="40" y="68" width="184" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="132" y="92" font-size="13.5" font-weight="600" fill="#085041" text-anchor="middle">1. Add camera row</text>
  <text x="132" y="110" font-size="12" fill="#0F6E56" text-anchor="middle">id + generated token</text>
  <line x1="224" y1="97" x2="270" y2="97" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="270" y="68" width="184" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="362" y="92" font-size="13.5" font-weight="600" fill="#085041" text-anchor="middle">2. Assign path</text>
  <text x="362" y="110" font-size="12" fill="#0F6E56" text-anchor="middle">venue/cam-NNN</text>
  <line x1="454" y1="97" x2="500" y2="97" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="500" y="68" width="150" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="575" y="92" font-size="13.5" font-weight="600" fill="#085041" text-anchor="middle">3. Flash camera</text>
  <text x="575" y="110" font-size="12" fill="#0F6E56" text-anchor="middle">URL + token</text>

  <line x1="575" y1="126" x2="575" y2="160" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Camera pushes -->
  <rect x="422" y="160" width="228" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="536" y="183" font-size="13.5" font-weight="600" fill="#3C3489" text-anchor="middle">Camera pushes RTMP</text>
  <text x="536" y="201" font-size="12" fill="#534AB7" text-anchor="middle">to the relay endpoint</text>
  <line x1="536" y1="214" x2="536" y2="242" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Relay container -->
  <rect x="40" y="244" width="610" height="152" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.75"/>
  <text x="64" y="270" font-size="13.5" font-weight="600" fill="#2c2c2a">Relay server (unchanged)</text>
  <text x="64" y="288" font-size="12" fill="#5f5e5a">MediaMTX validates the token against your data source on connect</text>

  <!-- Auth -->
  <rect x="64" y="304" width="172" height="74" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="150" y="332" font-size="13.5" font-weight="600" fill="#0C447C" text-anchor="middle">Auth check</text>
  <text x="150" y="352" font-size="12" fill="#185FA5" text-anchor="middle">token to publish</text>

  <!-- Fan-out -->
  <rect x="254" y="304" width="182" height="74" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="345" y="326" font-size="13.5" font-weight="600" fill="#0C447C" text-anchor="middle">Fan-out</text>
  <text x="345" y="344" font-size="12" fill="#185FA5" text-anchor="middle">RTSP for AI partner</text>
  <text x="345" y="360" font-size="12" fill="#185FA5" text-anchor="middle">HLS / WebRTC viewing</text>

  <!-- Recording -->
  <rect x="454" y="304" width="172" height="74" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="540" y="332" font-size="13.5" font-weight="600" fill="#0C447C" text-anchor="middle">Recording</text>
  <text x="540" y="352" font-size="12" fill="#185FA5" text-anchor="middle">on-demand worker</text>
</svg>
